<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Medias Stitch | Todo-calzado</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 10px;">

    <div style="max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        
        <header style="text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px;">
            <h2 style="margin: 0; color: #333;">👟 TODO-CALZADO</h2>
            <p style="color: #666; font-size: 14px;">Medellín - Pago Contra Entrega</p>
        </header>

        <div style="margin: 20px 0; text-align: center;">
            <img src="1739810304Medias Locas Stitch 17CM031 (4).jpg" style="width: 100%; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ddd;">
            <img src="1739810304Medias Locas Stitch 17CM031 (2).jpg" style="width: 100%; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ddd;">
            <img src="1739810304Medias Locas Stitch 17CM031.jpg" style="width: 100%; border-radius: 10px; border: 1px solid #ddd;">
        </div>

        <div style="text-align: center; margin: 20px 0;">
            <h3 style="margin: 0; color: #007bff;">Medias Locas de Stitch</h3>
            <p style="font-size: 28px; color: #e63946; font-weight: bold; margin: 10px 0;">$28.000 COP</p>
            <div style="background: #fff9db; padding: 15px; border-radius: 10px; text-align: left; font-size: 14px; color: #555; line-height: 1.6;">
                ✨ <b>Talla:</b> Única (4 a 11 años)<br>
                👟 <b>Ajuste:</b> Hasta talla de calzado 35<br>
                ⚠️ <b>Cuidado:</b> Lavar a mano únicamente.
            </div>
        </div>

        <form id="orderForm" style="background: #fdfdfd; padding: 15px; border-radius: 10px; border: 1px solid #eee;">
            <p style="text-align: center; font-weight: bold; margin-top: 0;">DATOS DE ENVÍO 🚛</p>
            <input type="text" id="nombre" placeholder="Nombre completo" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;">
            <input type="text" id="direccion" placeholder="Dirección y Barrio" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;">
            <input type="tel" id="celular" placeholder="Celular" required style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;">

            <button type="button" onclick="enviarPedido()" style="width: 100%; background-color: #25d366; color: white; padding: 18px; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer;">
                ✅ CONFIRMAR PEDIDO
            </button>
        </form>
    </div>

    <script>
        function enviarPedido() {
            const nombre = document.getElementById('nombre').value;
            const direccion = document.getElementById('direccion').value;
            const celular = document.getElementById('celular').value;
            if(nombre && direccion && celular) {
                const mensaje = `¡Nuevo Pedido!%0A%0A🧦 Medias Stitch%0A👤 Nombre: ${nombre}%0A📍 Dirección: ${direccion}%0A📱 Celular: ${celular}%0A💰 Total: $28.000`;
                window.location.href = `https://wa.me/573146742585?text=${mensaje}`;
            } else { alert("Completa los datos de envío."); }
        }
    </script>
</body>
</html>
