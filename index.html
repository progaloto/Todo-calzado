<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Todo-calzado</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f9f9f9; color: #333; }
        .header { background: #000; color: #fff; text-align: center; padding: 12px; font-size: 14px; font-weight: bold; }
        .container { max-width: 450px; margin: auto; padding: 20px; background: #fff; min-height: 100vh; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        img { width: 100%; border-radius: 15px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin: 10px 0; color: #000; }
        .precio { font-size: 22px; color: #d00; font-weight: bold; margin-bottom: 25px; }
        .info { background: #f0f0f0; padding: 15px; border-radius: 10px; margin-bottom: 25px; font-size: 14px; text-align: left; }
        .btn-ws { display: block; background: #25d366; color: white; padding: 18px; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 18px; text-align: center; }
    </style>
</head>
<body>
    <div class="header">📦 ENVÍOS A TODO EL PAÍS - PAGO CONTRA ENTREGA</div>
    <div class="container">
        <img id="foto" src="https://via.placeholder.com/400x400.png?text=Cargando..." alt="Zapato">
        <h1 id="nombre">Cargando modelo...</h1>
        <div class="precio" id="precio">--</div>
        <div class="info">
            ✅ Calidad Garantizada<br>
            ✅ Tallas disponibles: 37 a 43<br>
            ✅ Cambios fáciles y rápidos
        </div>
        <a href="#" id="boton-ws" class="btn-ws">Pedir por WhatsApp Ahora</a>
    </div>

    <script>
        // LISTA DE ZAPATOS (Puedes agregar más aquí abajo)
        const zapatos = {
            "jordan-retro": {
                nombre: "Jordan Retro 4 - Black Cat",
                precio: "$220.000",
                foto: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=500"
            },
            "nike-force": {
                nombre: "Nike Air Force 1 - White",
                precio: "$180.000",
                foto: "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?q=80&w=500"
            }
        };

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const producto = zapatos[id];

        if (producto) {
            document.getElementById('nombre').innerText = producto.nombre;
            document.getElementById('precio').innerText = producto.precio;
            document.getElementById('foto').src = producto.foto;
            // REEMPLAZA EL NÚMERO DE ABAJO POR EL TUYO
            document.getElementById('boton-ws').href = "https://wa.me/573000000000?text=Hola! Me interesan los " + producto.nombre;
        } else {
            document.getElementById('nombre').innerText = "Selecciona un modelo en el chat";
        }
    </script>
</body>
  </html>
