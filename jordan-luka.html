<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan Luka 5 - Todo-Calzado</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; background-color: #f9f9f9; }
        .container { max-width: 450px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* Estilos del Carrusel */
        .carrusel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 10px; border-radius: 15px; margin-bottom: 15px; }
        .carrusel img { width: 100%; flex-shrink: 0; scroll-snap-align: start; object-fit: cover; height: 300px; }
        
        .info { text-align: center; margin-bottom: 20px; }
        .precio { font-size: 28px; font-weight: bold; color: #1a1a1a; margin: 5px 0; }
        .pago { color: #27ae60; font-weight: bold; text-transform: uppercase; font-size: 14px; }
        
        /* Estilos del Formulario */
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-finalizar { background: #2ecc71; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        
        /* Botón de WhatsApp Flotante */
        .btn-whatsapp { position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; align-items: center; z-index: 100; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center">👟 TODO-CALZADO</h2>
    
    <div class="carrusel">
        <img src="https://via.placeholder.com/400x300?text=Foto+1" alt="Jordan 1">
        <img src="https://via.placeholder.com/400x300?text=Foto+2" alt="Jordan 2">
        <img src="https://via.placeholder.com/400x300?text=Foto+3" alt="Jordan 3">
    </div>

    <div class="info">
        <h3>JORDAN LUKA 5</h3>
        <p class="precio">$999.000 COP</p>
        <p class="pago">PAGO CONTRA ENTREGA</p>
    </div>

    <div class="formulario">
        <h4 style="text-align:center">FORMULARIO DE PEDIDO</h4>
        <input type="text" placeholder="Nombre completo">
        <input type="text" placeholder="Ciudad">
        <input type="text" placeholder="Barrio">
        <input type="text" placeholder="Dirección exacta">
        <input type="tel" placeholder="Teléfono (WhatsApp)">
        <select>
            <option>Selecciona tu Talla (US)</option>
            <option>7</option>
            <option>8</option>
            <option>9</option>
            <option>10</option>
        </select>
        <button class="btn-finalizar">🚀 FINALIZAR PEDIDO</button>
    </div>
</div>

<a href="https://wa.me/573146742585?text=Hola!%20Necesito%20asesoría%20con%20los%20Jordan%20Luka%205" class="btn-whatsapp">
    💬 Hablar con asesor
</a>

</body>
</html>
