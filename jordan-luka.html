<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan Luka 5 - Todo-Calzado</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fff; color: #333; }
        .container { max-width: 450px; margin: auto; padding: 15px; }
        .carrusel { display: flex; overflow-x: auto; snap-type: x mandatory; background: #f9f9f9; }
        .carrusel img { width: 100%; flex-shrink: 0; snap-align: start; }
        .info { text-align: center; padding: 15px 0; }
        .precio-final { font-size: 32px; font-weight: bold; color: #000; }
        form { background: #f4f4f4; padding: 20px; border-radius: 15px; display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 13px; font-weight: bold; color: #666; margin-bottom: -5px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; width: 100%; box-sizing: border-box; }
        .btn { background: #25D366; color: white; padding: 18px; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center;">👟 TODO-CALZADO</h2>
        
        <div class="carrusel">
            <img src="Screenshot_20260322-132704-824.png">
            <img src="Screenshot_20260322-132718-122.png">
            <img src="Screenshot_20260322-132739-270.png">
            <img src="Screenshot_20260322-132800-495.png">
        </div>

        <div class="info">
            <h1 style="margin:0; font-size:22px;">JORDAN LUKA 5</h1>
            <span class="precio-final">$999.000 COP</span>
            <p style="color:green; font-weight:bold; margin: 5px 0;">PAGO CONTRA ENTREGA</p>
        </div>

        <form id="orderForm">
            <h3 style="margin:0 0 10px 0; text-align:center; font-size: 18px;">FORMULARIO DE PEDIDO</h3>
            
            <input type="text" id="nombre" placeholder="Nombre completo" required>
            <input type="text" id="ciudad" placeholder="Ciudad" required>
            <input type="text" id="barrio" placeholder="Barrio" required>
            <input type="text" id="dir" placeholder="Dirección exacta" required>
            <input type="tel" id="tel" placeholder="Teléfono (WhatsApp)" required>
            <input type="email" id="email" placeholder="Correo electrónico" required>
            
            <select id="talla" required>
                <option value="">Selecciona tu Talla (US)</option>
                <option value="8.0">8.0 US</option>
                <option value="8.5">8.5 US</option>
                <option value="9.0">9.0 US</option>
                <option value="9.5">9.5 US</option>
                <option value="10.0">10.0 US</option>
                <option value="11.0">11.0 US</option>
            </select>

            <label>¿Para cuándo necesitas los tenis?</label>
            <input type="date" id="fecha" required>

            <button type="button" class="btn" onclick="enviarPedido()">🚀 FINALIZAR PEDIDO</button>
        </form>
    </div>

    <script>
        function enviarPedido() {
            const campos = ['nombre', 'ciudad', 'barrio', 'dir', 'tel', 'email', 'talla', 'fecha'];
            const datos = {};
            
            for(let id of campos) {
                datos[id] = document.getElementById(id).value;
                if(!datos[id]) return alert("Por favor, completa todos los campos");
            }
            
            const msj = `¡Hola Todo-Calzado!%0AQuiero confirmar mi pedido de los *Jordan Luka 5*:%0A%0A` +
                        `*Nombre:* ${datos.nombre}%0A` +
                        `*Ciudad:* ${datos.ciudad}%0A` +
                        `*Barrio:* ${datos.barrio}%0A` +
                        `*Dirección:* ${datos.dir}%0A` +
                        `*Teléfono:* ${datos.tel}%0A` +
                        `*Email:* ${datos.email}%0A` +
                        `*Talla:* ${datos.talla}%0A` +
                        `*Fecha estimada:* ${datos.fecha}`;

            window.location.href = `https://wa.me/573146742585?text=${msj}`;
        }
    </script>
</body>
</html>
